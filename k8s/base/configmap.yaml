apiVersion: v1
kind: ConfigMap
metadata:
  name: keetvibe-config
  namespace: keetvibe
data:
  APP_ENV: "prod"
  LOG_LEVEL: "info"
  WS_PORT: "8080"
  SFU_PORT: "8000"
  ALLOWED_ORIGINS: "https://keetvibe.com,https://app.keetvibe.com"
  RATE_LIMIT_CONN_PER_IP: "10"
  RATE_LIMIT_MSG_PER_USER: "20"
  RATE_LIMIT_ROOMS_PER_USER: "5"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "keetvibe"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "8123"
  MINIO_ENDPOINT: "minio:9000"
